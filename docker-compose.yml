services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resumeuser
      POSTGRES_PASSWORD: resumepassword
      POSTGRES_DB: resumedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumeuser -d resumedb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment for GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://resumeuser:resumepassword@postgres:5432/resumedb
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      OUTPUT_DIR: /app/output
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  ollama_data:
